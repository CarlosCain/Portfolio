<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layouts/defaultTemplate">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Create Product</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <h1>Create Product</h1>
            <form th:action="@{/products/create}" th:object="${productModel}" method="post">
                <div class="form-group">
                    <label for="orderNo">Order Number</label>
                    <input type="text" th:field="*{orderNo}" class="form-control" id="orderNo" required>
                </div>
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" th:field="*{productName}" class="form-control" id="productName" required>
                </div>
                <div class="form-group">
                    <label for="productCompany">Product Company</label>
                    <input type="text" th:field="*{productCompany}" class="form-control" id="productCompany" required>
                </div>
                <div class="form-group">
                    <label for="price">Price</label>
                    <input type="number" th:field="*{price}" class="form-control" id="price" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" th:field="*{quantity}" class="form-control" id="quantity" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea th:field="*{description}" class="form-control" id="description"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Create Product</button>
            </form>
        </div>
    </div>
</body>
</html>
